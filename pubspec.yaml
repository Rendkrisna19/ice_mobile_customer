name: ice_mobile_customer
description: "ZAD Apps: Lifestyle & Care — platform terpadu untuk layanan kuliner dan gaya hidup ZAD."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI and Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^7.0.1
  
  # State Management
  flutter_riverpod: ^3.1.0
  
  # Networking
  dio: ^5.9.0
  http: ^1.2.0
  
  # Localization and Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.2
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.2
  
  # Location and Maps
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  
  # Hardware and Media
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.7.1
  json_serializable: ^6.11.2
  
  # Launcher Icons Generator
  flutter_launcher_icons: ^0.13.1

# Konfigurasi Icon Aplikasi
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_utama.png" 
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/images/logo_waiting.png
    - assets/images/order_status.png
    - assets/images/delivery.png
    - assets/images/compleate.png
    - assets/images/avatar.png

  fonts:
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700